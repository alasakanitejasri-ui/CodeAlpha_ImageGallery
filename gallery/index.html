<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Premium Image Gallery</h1>
</header>

<div class="gallery">

    <img src="image1.jpg.jpeg" onclick="openImage(this.src)">
    <img src="image2.jpg.jpeg" onclick="openImage(this.src)">
    <img src="image3.jpg.jpeg" onclick="openImage(this.src)">
    <img src="image4.jpg.jpeg" onclick="openImage(this.src)">
    <img src="image5.jpg.jpeg" onclick="openImage(this.src)">
    <img src="image6.jpg.jpeg" onclick="openImage(this.src)">

</div>

<div class="lightbox" id="lightbox">
    <span onclick="closeImage()">&times;</span>
    <img id="lightbox-img">
</div>

<script src="script.js"></script>

</body>
</html>
